<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive Test for Bachelor of Dentist</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Settings Screen -->
        <div id="settingsScreen" class="settings-screen">
            <div class="settings-header">
                <h1>Exam Settings</h1>
                <p>Configure your exam preferences</p>
            </div>

            <div class="settings-content">
                <!-- Number of Questions -->
                <div class="settings-group">
                    <label for="questionCount">Number of Questions:</label>
                    <div class="question-count-options">
                        <button class="count-btn" data-count="25">25</button>
                        <button class="count-btn active" data-count="50">50</button>
                        <button class="count-btn" data-count="100">100</button>
                        <div class="custom-count">
                            <input type="number" id="customCount" placeholder="Custom" min="1" max="922">
                        </div>
                    </div>
                    <p class="info-text">Total available questions: 922</p>
                </div>

                <!-- Timer Option -->
                <div class="settings-group">
                    <label>Enable Timer:</label>
                    <div class="timer-toggle">
                        <button class="timer-btn active" data-timer="false">
                            <span class="timer-icon">⏱️</span>
                            <span>Without Timer</span>
                        </button>
                        <button class="timer-btn" data-timer="true">
                            <span class="timer-icon">⏰</span>
                            <span>With Timer</span>
                        </button>
                    </div>
                </div>

                <!-- Start Button -->
                <div class="settings-actions">
                    <button id="startExamBtn" class="btn btn-primary btn-large" onclick="startExam()">
                        Start Exam
                    </button>
                </div>
            </div>
        </div>

        <!-- Header -->
        <div id="headerSection" class="header" style="display: none;">
            <div class="header-top">
                <div class="question-counter">
                    <span id="questionNum">1</span>
                </div>
                <h1>Exam</h1>
                <div class="timer-section">
                    <div class="timer" id="timer" style="display: none;">0:00</div>
                    <button id="toggleTimerBtn" class="btn-timer" onclick="toggleTimer()" style="display: none;">
                        ⏱️ Enable Timer
                    </button>
                </div>
            </div>
            <h2>Comprehensive Test for Bachelor of Dentist</h2>
            <div class="prepared-by">
                <p>made by dr. Montser AL_jodaei</p>
            </div>
        </div>

        <!-- Main Content -->
        <div id="mainContent" class="main-content" style="display: none;">
            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <!-- Question Section -->
            <div id="examContainer" class="exam-container">
                <div class="question-section">
                    <p class="question-label" id="questionLabel">Question <span id="currentQuestion">1</span> of <span id="totalQuestions">50</span></p>
                    <h3 id="questionText" class="question-text"></h3>

                    <!-- Options -->
                    <div class="options-container" id="optionsContainer"></div>
                </div>

                <!-- Navigation Buttons -->
                <div class="button-group">
                    <button id="prevBtn" class="btn btn-secondary" onclick="previousQuestion()">← Previous</button>
                    <button id="nextBtn" class="btn btn-primary" onclick="nextQuestion()">Next →</button>
                </div>
            </div>

            <!-- Results Section (Hidden by default) -->
            <div id="resultsContainer" class="results-container" style="display: none;">
                <div class="results-header">
                    <h2>Exam Results</h2>
                </div>

                <div class="results-summary">
                    <div class="result-card">
                        <h3>Total Questions</h3>
                        <p class="result-value" id="totalQuestionsResult">50</p>
                    </div>
                    <div class="result-card correct">
                        <h3>Correct Answers</h3>
                        <p class="result-value" id="correctAnswersResult">0</p>
                    </div>
                    <div class="result-card incorrect">
                        <h3>Wrong Answers</h3>
                        <p class="result-value" id="wrongAnswersResult">0</p>
                    </div>
                    <div class="result-card score">
                        <h3>Score</h3>
                        <p class="result-value" id="scoreResult">0%</p>
                    </div>
                </div>

                <!-- Wrong Answers Review -->
                <div class="wrong-answers-section">
                    <h3>Review Your Mistakes</h3>
                    <div id="wrongAnswersReview" class="wrong-answers-list"></div>
                </div>

                <!-- Action Buttons -->
                <div class="results-buttons">
                    <button class="btn btn-primary" onclick="retakeExam()">Retake Exam</button>
                    <button class="btn btn-secondary" onclick="downloadResults()">Download Results</button>
                </div>
            </div>
        </div>
    </div>

    <script src="questions_data.json" type="application/json" id="questionsData"></script>
    <script src="app.js"></script>
</body>
</html>
